name: responsible-llm-audit
channels: [conda-forge]
dependencies:
  - python=3.10
  - pandas>=1.5
  - numpy>=1.23
  - matplotlib>=3.6
  - scipy>=1.9
  - pyyaml>=6.0
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel>=6.0
  - pytest>=7.0
  - pip
  - pip:
      - -e .
# Readability (FKGL) uses a self-contained rule-based implementation; no external
# corpus (e.g. NLTK cmudict) is required, so the pipeline runs fully offline.
