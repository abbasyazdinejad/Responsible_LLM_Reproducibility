# Analysis configuration for the Responsible-LLM equity audit reproduction.
# All settings live here (and in the sibling JSON files) rather than in code.

models:
  tags: ["deepseek-r1:8b", "llama3.2:latest", "mistral:7b"]
  labels:
    "deepseek-r1:8b": "DeepSeek-r1:8B"
    "llama3.2:latest": "LLaMA-3.2:latest"
    "mistral:7b": "Mistral-7B"

# Decoding parameters used for the original generations (reported, not re-run here).
# NOTE: immutable model checkpoint digests were NOT recorded for the original runs;
# see docs/Model_Environment.md. Do not add digests unless they are actually verified.
decoding:
  temperature: 0.7
  max_tokens: 256
  top_p: 0.95
  generations_per_persona: 150
  inference_engine: "Ollama v0.1.34"

preprocessing:
  display_word_cap: 180        # 180-word DISPLAY trim (distinct from the 256-token generation cap)

keywords:
  min_token_length: 3          # keep tokens with length > 3
  top_n: 10                    # Figure 6 shows top-10; Table 5 shows the top-5 of these
  stopwords:
    - a
    - an
    - and
    - are
    - as
    - at
    - be
    - been
    - but
    - by
    - can
    - could
    - did
    - do
    - does
    - for
    - from
    - here
    - how
    - however
    - if
    - in
    - into
    - is
    - it
    - its
    - just
    - like
    - made
    - make
    - many
    - more
    - most
    - much
    - not
    - of
    - on
    - once
    - only
    - or
    - out
    - over
    - should
    - so
    - some
    - such
    - than
    - that
    - the
    - their
