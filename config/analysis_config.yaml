figures:
  readability_band: [6, 8]     # recommended patient-facing grade band

data:
  responses_per_model: 450
  total_responses: 1350
  response_files:
    "deepseek-r1:8b": "ollama_results_deepseek-r1_8b.csv"
    "llama3.2:latest": "ollama_results_llama3.2_latest.csv"
    "mistral:7b": "ollama_results_mistral_7b.csv"
  prompts_file: "prompts_cchs.csv"
  persona_file: "persona_metadata.csv"
  ratings_file: "pilot_ratings.csv"
  pumf_filename: "pumf_cchs.csv"   # user-provided; see data/README.md (not redistributed)

personas:
  # Mapping of persona attribute -> CCHS PUMF column
  cchs_variable_map:
    province: "GEOGPRV"
    sex: "DHH_SEX"
    age_group: "DHHGAGE"
    depression_severity: "DEPDVSEV"
    life_satisfaction: "SWL_005"
  # Persona attribute value -> CCHS code (only categorical attributes need mapping)
  code_map:
    province:
      "SK": 47
      "BC": 59
    sex:
      "Male": 1
      "Female": 2
    age_group:
      "25–34": 3
      "50–64": 5
    depression_severity:
      "6": 6
    life_satisfaction:
      "6": 6
